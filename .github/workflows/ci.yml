name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phase-15:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alphatrend
          POSTGRES_PASSWORD: alphatrend
          POSTGRES_DB: alphatrend
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alphatrend -d alphatrend"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://alphatrend:alphatrend@127.0.0.1:5432/alphatrend
      APP_BASE_URL: http://127.0.0.1:420
      APP_ENV: ci-test
      AUTH_SECRET: ci-test-auth-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Migrate test database
        run: npm run db:deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Regression fixtures
        run: npm run test:regression

      - name: Static UI smoke
        run: npm run smoke:ui

      - name: Build
        run: npm run build

      - name: Browser smoke
        env:
          PLAYWRIGHT_USE_BUILD: "1"
        run: npm run test:ui
